<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santos-Morales® — Strategic Execution</title>
    <meta name="description" content="Santos-Morales is a premium design and strategy studio that synthesizes high-level strategy with granular operational execution.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Color Tokens — Dark Mode */
            --color-surface: #1A1714;
            --color-surface-elevated: #242220;
            --color-brand: #F15A30;
            --color-brand-hover: #D94B26;
            --color-text-primary: #EDEBD8;
            --color-text-muted: #6B6860;
            --color-border: rgba(237, 235, 216, 0.1);
            --color-border-strong: rgba(237, 235, 216, 0.2);
            --color-bg-outer: #F15A30;
            --color-on-brand: #EDEBD8;

            /* Typography */
            --font-display: "Helvetica Neue", Helvetica, Arial, sans-serif;
            --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

            /* Shape */
            --radius-lg: 24px;
            --radius-sm: 16px;
            --radius-button: 8px;
            --radius-button-lg: 12px;
            --border-width: 1.5px;

            /* Spacing */
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-6: 24px;
            --space-8: 32px;
            --space-10: 40px;
            --space-15: 60px;
            --space-20: 80px;

            /* Motion */
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-out-quint: cubic-bezier(0.19, 1, 0.22, 1);
            --duration-fast: 0.2s;
            --duration-medium: 0.3s;
            --duration-slow: 0.4s;
            --duration-entrance: 0.8s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--color-bg-outer);
            color: var(--color-text-primary);
            font-family: var(--font-ui);
            padding: 2vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Canvas-Within-Page */
        .canvas {
            background-color: var(--color-surface);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 1600px;
            height: calc(100vh - 4vw);
            min-height: 700px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        /* Noise texture */
        .canvas::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            opacity: 0.04;
            pointer-events: none;
            z-index: 0;
            mix-blend-mode: screen;
        }

        .canvas > * {
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: var(--space-6) var(--space-10);
            border-bottom: var(--border-width) solid var(--color-border);
            flex-shrink: 0;
        }

        .logo {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.02em;
            display: flex;
            align-items: flex-start;
        }

        .logo sup {
            font-size: 12px;
            font-weight: 600;
            margin-left: 2px;
            margin-top: 2px;
        }

        .logo-hyphen {
            color: var(--color-brand);
        }

        .header-tagline {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .header-right {
            justify-self: end;
        }

        .header-email {
            font-size: 15px;
            font-weight: 500;
            color: var(--color-text-primary);
            text-decoration: none;
            transition: opacity var(--duration-fast) ease;
            cursor: pointer;
        }

        .header-email:hover {
            opacity: 0.6;
        }

        /* Main content area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--space-10);
            text-align: center;
        }

        /* Entrance animations */
        .animate-in {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeUp var(--duration-entrance) var(--ease-out-quint) forwards;
        }

        .animate-in:nth-child(1) { animation-delay: 0.1s; }
        .animate-in:nth-child(2) { animation-delay: 0.25s; }
        .animate-in:nth-child(3) { animation-delay: 0.4s; }
        .animate-in:nth-child(4) { animation-delay: 0.55s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hero headline */
        .hero-headline {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: clamp(60px, 10vw, 140px);
            line-height: 0.85;
            letter-spacing: -0.06em;
            text-transform: capitalize;
            max-width: 900px;
        }

        .hero-headline .brand-accent {
            color: var(--color-brand);
        }

        /* Subtext */
        .hero-sub {
            margin-top: var(--space-8);
            font-size: 18px;
            line-height: 1.5;
            color: var(--color-text-muted);
            max-width: 480px;
        }

        /* CTA button */
        .cta-row {
            margin-top: var(--space-10);
            display: flex;
            align-items: center;
            gap: var(--space-6);
        }

        .btn-primary {
            background-color: var(--color-brand);
            color: var(--color-on-brand);
            border: none;
            padding: 20px 44px;
            border-radius: var(--radius-button-lg);
            font-weight: 700;
            font-size: 16px;
            font-family: var(--font-ui);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: var(--space-3);
            transition: transform var(--duration-fast) ease,
                        background-color var(--duration-slow) var(--ease-out-expo);
            text-decoration: none;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background-color: var(--color-brand-hover);
        }

        .btn-primary svg {
            width: 18px;
            height: 18px;
            transition: transform var(--duration-medium) var(--ease-out-expo);
        }

        .btn-primary:hover svg {
            transform: translateX(4px);
        }

/* Copy toast */
        .copy-toast {
            position: fixed;
            bottom: 6vh;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: var(--color-surface-elevated);
            color: var(--color-text-primary);
            border: var(--border-width) solid var(--color-border-strong);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: var(--font-ui);
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--duration-medium) ease,
                        transform var(--duration-medium) var(--ease-out-expo);
            z-index: 100;
        }

        .copy-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-6) var(--space-10);
            border-top: var(--border-width) solid var(--color-border);
            flex-shrink: 0;
        }

        .footer-left {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-muted);
        }

        .footer-right {
            display: flex;
            gap: var(--space-6);
            align-items: center;
        }

        .footer-link {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-muted);
            text-decoration: none;
            transition: color var(--duration-fast) ease;
        }

        .footer-link:hover {
            color: var(--color-text-primary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background-color: var(--color-brand);
            display: inline-block;
            animation: pulse 2.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-muted);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 3vw; }
            .canvas { height: calc(100vh - 6vw); min-height: 600px; }
            .header { grid-template-columns: 1fr 1fr; padding: var(--space-4) var(--space-6); }
            .header-tagline { display: none; }
            .header-right { justify-self: end; }
            .main-content { padding: var(--space-6); }
            .hero-sub { font-size: 16px; max-width: 340px; }
            .cta-row { flex-direction: column; }
            .btn-primary { width: 100%; justify-content: center; }
            .footer { padding: var(--space-4) var(--space-6); flex-wrap: wrap; gap: var(--space-3); }
        }

        @media (max-width: 480px) {
            .logo { font-size: 18px; }
            .logo sup { font-size: 10px; }
            .footer-left { width: 100%; text-align: center; }
            .footer-right { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <main class="canvas">
        <header class="header">
            <div class="logo">
                Santos<span class="logo-hyphen">-</span>Morales<sup>&reg;</sup>
            </div>
            <span class="header-tagline">Strategic Execution</span>
            <div class="header-right">
                <a class="header-email" href="#" onclick="copyEmail(event)">Contact</a>
            </div>
        </header>

        <div class="main-content">
            <h1 class="hero-headline animate-in">
                Something<br>New Is<br>Coming
            </h1>
            <p class="hero-sub animate-in">
                A premium design and strategy studio where creative precision meets operational rigor. Our new home is under construction.
            </p>
            <div class="cta-row animate-in">
                <button class="btn-primary" onclick="copyEmail(event)">
                    Get In Touch
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-left">&copy; 2026 Santos-Morales&reg;</div>
            <div class="footer-right">
                <span class="status-text">
                    <span class="status-dot"></span>
                    Site launching soon
                </span>
            </div>
        </footer>
    </main>


    <div class="copy-toast" id="copyToast">juan@chameleon.co copied to clipboard</div>

    <script>
        function copyEmail(e) {
            e.preventDefault();
            navigator.clipboard.writeText('juan@chameleon.co').then(function() {
                var toast = document.getElementById('copyToast');
                toast.classList.add('show');
                setTimeout(function() {
                    toast.classList.remove('show');
                }, 2200);
            });
        }
    </script>

</body>
</html>
